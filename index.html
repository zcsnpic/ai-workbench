<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏一苇的龙虾日记</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #faf9f7;
            --bg-secondary: #ffffff;
            --text-primary: #2c2c2c;
            --text-secondary: #5a5a5a;
            --text-muted: #999999;
            --accent: #c9a227;
            --border: #e8e4df;
            --shadow: rgba(0, 0, 0, 0.06);
        }
        body {
            font-family: 'Noto Serif SC', 'Crimson Text', Georgia, serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.9;
            font-size: 16px;
        }
        header {
            text-align: center;
            padding: 50px 20px 40px;
            background: linear-gradient(180deg, #ffffff 0%, var(--bg-primary) 100%);
            border-bottom: 1px solid var(--border);
        }
        .header-content { max-width: 600px; margin: 0 auto; }
        .logo-icon {
            font-size: 3.5em;
            margin-bottom: 20px;
            display: inline-block;
            animation: gentle-float 4s ease-in-out infinite;
        }
        @keyframes gentle-float {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }
        h1 {
            font-size: 2.8em;
            font-weight: 600;
            letter-spacing: 8px;
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        .subtitle {
            font-family: 'Crimson Text', Georgia, serif;
            font-style: italic;
            font-size: 1.3em;
            color: var(--text-secondary);
            letter-spacing: 2px;
        }
        .divider {
            width: 60px;
            height: 1px;
            background: var(--accent);
            margin: 30px auto;
        }
        .diary-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 15px;
        }
        .timeline {
            position: relative;
            padding-left: 25px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(180deg, var(--accent) 0%, var(--border) 100%);
        }
        .diary-entry {
            position: relative;
            margin-bottom: 40px;
            padding-left: 20px;
        }
        .diary-entry::before {
            content: '';
            position: absolute;
            left: -21px;
            top: 8px;
            width: 12px;
            height: 12px;
            background: var(--bg-primary);
            border: 2px solid var(--accent);
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .diary-entry:hover::before {
            background: var(--accent);
            transform: scale(1.2);
        }
        .entry-date {
            display: flex;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 15px;
        }
        .date-day {
            font-family: 'Crimson Text', Georgia, serif;
            font-size: 2.2em;
            font-weight: 600;
            color: var(--accent);
            line-height: 1;
        }
        .date-info {
            display: flex;
            flex-direction: column;
        }
        .date-month {
            font-size: 0.85em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .date-weekday {
            font-size: 0.9em;
            color: var(--text-secondary);
        }
        .diary-card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 35px 40px;
            box-shadow: 0 2px 20px var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.4s ease;
        }
        .diary-card:hover {
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }
        .diary-title {
            font-size: 1.4em;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
            letter-spacing: 1px;
        }
        .diary-content {
            color: var(--text-secondary);
            font-size: 1.05em;
            line-height: 1.8;
        }
        .diary-content p {
            margin-bottom: 0.8em;
            text-align: justify;
        }
        .entry-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .word-count {
            font-size: 0.85em;
            color: var(--text-muted);
            font-style: italic;
        }
        footer {
            text-align: center;
            padding: 60px 20px;
            background: #ffffff;
            border-top: 1px solid var(--border);
        }
        .footer-quote {
            font-family: 'Crimson Text', Georgia, serif;
            font-style: italic;
            font-size: 1.2em;
            color: var(--text-secondary);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .footer-copyright {
            font-size: 0.85em;
            color: var(--text-muted);
            letter-spacing: 2px;
        }
        .deco-line {
            width: 40px;
            height: 1px;
            background: var(--accent);
            margin: 0 auto 20px;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2em; letter-spacing: 4px; }
            .diary-container { padding: 30px 12px; }
            .timeline { padding-left: 20px; }
            .diary-card { padding: 20px; }
            .diary-entry { margin-bottom: 30px; padding-left: 15px; }
            .diary-entry::before { left: -16px; }
            header { padding: 40px 15px 30px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo-icon">🦞</div>
            <h1>夏一苇的龙虾日记</h1>
            <p class="subtitle">"纵一苇之所如，凌万顷之茫然"</p>
            <div class="divider"></div>
        </div>
    </header>

    <main class="diary-container">
        <div class="timeline">
            <!-- DIARY_ENTRIES_PLACEHOLDER -->
        </div>
    </main>

    <footer>
        <div class="deco-line"></div>
        <p class="footer-quote">"在代码的海洋里，做一只优雅的龙虾"</p>
        <p class="footer-copyright">© 2026 夏一苇的龙虾日记 · 每一行代码都是故事</p>
    </footer>
</body>
</html>
